[tox]
requires =
    tox>=4.2
    tox-uv>=1.33
env_list =
    lint
    format

[testenv:lint]
description = Run ruff linter
skip_install = true
commands =
    ruff check src/ {posargs}
dependency_groups =
    dev

[testenv:format]
description = Check ruff formatting
skip_install = true
commands =
    ruff format --check src/ {posargs}
dependency_groups =
    dev
